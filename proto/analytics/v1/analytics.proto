syntax = "proto3";

package analytics.v1;

option go_package = "github.com/narroworb/core_api/gen/analytics/v1;analyticsv1";

service AnalyticsService {
  // Lightweight health check for liveness and dependency readiness.
  rpc Health(HealthRequest) returns (HealthResponse);

  // Estimates win/draw/lose probabilities for a match by using recent matches
  // from ClickHouse and a Poisson score model.
  rpc GetMatchWinProbabilities(GetMatchWinProbabilitiesRequest) returns (GetMatchWinProbabilitiesResponse);

  // Computes a form index for a team using exponentially-decayed recent results.
  rpc GetTeamFormIndex(GetTeamFormIndexRequest) returns (GetTeamFormIndexResponse);

  // Finds similar players (same position) from aggregated match statistics.
  rpc GetPlayerSimilarityTopK(GetPlayerSimilarityTopKRequest) returns (GetPlayerSimilarityTopKResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;        // "ok" | "degraded"
  string clickhouse = 2;    // "ok" | "error:..."
  int64 server_time_unix = 3;
}

message GetMatchWinProbabilitiesRequest {
  uint32 home_team_id = 1;
  uint32 away_team_id = 2;
  string season = 3;          // "2025/2026"
  uint32 matches_back = 4;    // e.g. 10
  uint32 max_goals = 5;       // e.g. 10
}

message GetMatchWinProbabilitiesResponse {
  double p_home_win = 1;
  double p_draw = 2;
  double p_away_win = 3;
  double lambda_home = 4;
  double lambda_away = 5;
  string model = 6;          // "poisson_recent_matches_v1"
  string details = 7;        // human readable summary (optional)
}

message GetTeamFormIndexRequest {
  uint32 team_id = 1;
  string season = 2;           // "2025/2026"
  uint32 matches_back = 3;     // e.g. 10
  double half_life_matches = 4; // e.g. 5.0
}

message GetTeamFormIndexResponse {
  double form_index = 1;     // 0..1 (normalized)
  double attack_index = 2;   // 0..1
  double defense_index = 3;  // 0..1 (higher = better defense)
  double trend = 4;          // -1..1
  double confidence = 5;     // 0..1
  uint32 matches_used = 6;
  string details = 7;
}

message GetPlayerSimilarityTopKRequest {
  uint32 player_id = 1;
  string season = 2;     // "2025/2026"
  uint32 top_k = 3;      // e.g. 10
  uint32 min_minutes = 4; // e.g. 600
}

message SimilarPlayer {
  uint32 player_id = 1;
  double similarity = 2;  // cosine similarity
}

message GetPlayerSimilarityTopKResponse {
  repeated SimilarPlayer players = 1;
  string position = 2; // position of query player
  string details = 3;
}

