version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - data_collector_default
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    networks:
      - data_collector_default
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  core_api:
    build: .
    container_name: core_api
    restart: always
    networks:
      - data_collector_default
      - auth_service_default
    depends_on:
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      ANALYTICS_GRPC_ADDR: ${ANALYTICS_GRPC_ADDR:-analytics_service:50051}
    command: ["./core_api"]

networks:
  data_collector_default:
    external: true
    name: data_collector_default
  auth_service_default:
    external: true
    name: auth_service_default

    
volumes:
  elasticsearch_data:
    driver: local