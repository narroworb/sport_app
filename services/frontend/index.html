<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Analytics</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>⚽ Sports Analytics</h2>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Home</a>
                <a href="/search" class="nav-link">Search</a>
                <div class="auth-section">
                    <span id="user-name" style="display:none; margin-right: 15px;"></span>
                    <button id="auth-btn" class="btn-primary" onclick="toggleAuthPanel()">Login</button>
                    <button id="logout-btn" class="btn-secondary" style="display:none;" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Auth Panel -->
    <div id="auth-panel" class="auth-panel" style="display:none;">
        <div class="auth-container">
            <div class="close-btn" onclick="toggleAuthPanel()">✕</div>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>
            
            <form id="login-form" class="tab-content active">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Login</button>
                <div id="login-error" class="error-msg"></div>
            </form>

            <form id="register-form" class="tab-content">
                <input type="text" id="register-username" placeholder="Username" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <input type="password" id="register-password-confirm" placeholder="Confirm Password" required>
                <button type="submit" class="btn-primary">Register</button>
                <div id="register-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h1>Football Analytics Platform</h1>
            <p>Explore player stats, team performance, and match results</p>
            <div class="search-bar">
                <input type="text" id="main-search" placeholder="Search players, teams, tournaments...">
                <button onclick="performSearch()">Search</button>
            </div>
        </section>

        <!-- Date Filter -->
        <section class="section">
            <div class="date-filter" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <h2 style="margin: 0;">📅 Matches</h2>
                <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
                    <button id="prev-day" class="btn-secondary" style="padding: 0.5rem 1rem; font-size: 1rem;">◀ Previous</button>
                    <input type="text" id="match-date-calendar" style="padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd; text-align: center; font-weight: bold; min-width: 150px;" readonly>
                    <button id="next-day" class="btn-secondary" style="padding: 0.5rem 1rem; font-size: 1rem;">Next ▶</button>
                    <button id="today-date-filter" class="btn-primary" style="padding: 0.5rem 1rem;">Today</button>
                </div>
            </div>
            <div id="recent-matches" class="matches-grid">
                <p class="loading">Loading matches...</p>
            </div>
        </section>

        <!-- Favorites -->
        <section class="section" id="favorites-section" style="display:none;">
            <h2>⭐ Your Favorites</h2>
            <div id="favorites-content"></div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Sports Analytics. All rights reserved.</p>
    </footer>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
