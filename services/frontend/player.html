<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игрок - Футбольная аналитика</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2><a href="/" style="text-decoration:none; color:#2c3e50;">⚽ Футбольная аналитика</a></h2>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Главная</a>
                <a href="/search" class="nav-link">Поиск</a>
                <div class="auth-section">
                    <span id="user-name" style="display:none; margin-right: 15px;"></span>
                    <button id="auth-btn" class="btn-primary" onclick="toggleAuthPanel()">Войти</button>
                    <button id="logout-btn" class="btn-secondary" style="display:none;" onclick="logout()">Выйти</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="auth-panel" class="auth-panel" style="display:none;">
        <div class="auth-container">
            <div class="close-btn" onclick="toggleAuthPanel()">✕</div>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login', event)">Вход</button>
                <button class="tab-btn" onclick="switchTab('register', event)">Регистрация</button>
            </div>
            
            <form id="login-form" class="tab-content active">
                <input type="text" id="login-username" placeholder="Логин" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button type="submit" class="btn-primary">Войти</button>
                <div id="login-error" class="error-msg"></div>
            </form>

            <form id="register-form" class="tab-content">
                <input type="text" id="register-username" placeholder="Логин" required>
                <input type="password" id="register-password" placeholder="Пароль" required>
                <input type="password" id="register-password-confirm" placeholder="Подтвердите пароль" required>
                <button type="submit" class="btn-primary">Регистрация</button>
                <div id="register-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <main class="container">
        <div id="player-detail" class="detail-container">
           <div class="detail-header">
                <div class="detail-title">
                    <h1 id="player-name">Загрузка...</h1>
                    <div class="detail-meta">
                        <span id="player-position" class="badge"></span>
                        <span id="player-nation" class="badge"></span>
                    </div>
                </div>
                <div class="detail-actions">
                    <button id="fav-btn" class="btn-secondary btn-small" onclick="toggleFavorite()" style="display:none;">★ Добавить в избранное</button>
                </div>
            </div>

            <!-- НОВЫЙ БЛОК: Дополнительная информация об игроке -->
            <div class="player-info" style="margin: 1rem 0; padding: 1rem; background: #f8f9fa; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 2rem;">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <span style="font-weight: bold;">🎂 Дата рождения:</span>
                    <span id="player-birthdate">-</span>
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <span style="font-weight: bold;">📏 Рост:</span>
                    <span id="player-height">-</span>
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <span style="font-weight: bold;">🦶 Предпочитаемая нога:</span>
                    <span id="player-foot">-</span>
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <span style="font-weight: bold;">📋 Статус:</span>
                    <span id="player-status">-</span>
                </div>
            </div>
            <!-- Фильтры статистики -->
            <div class="stats-filters" style="margin: 1rem 0; padding: 1rem; background: #f8f9fa; border-radius: 8px;">
                <h4 style="margin-bottom: 0.5rem;">📊 Фильтр статистики</h4>
                <div style="display: flex; gap: 2rem; flex-wrap: wrap;">
                    <!-- Фильтр по сезону -->
                    <div style="flex: 1; min-width: 200px;">
                        <label style="font-weight: bold;">Фильтр по сезону:</label>
                        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                            <select id="season-filter" style="flex: 1; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                                <option value="">Выберите сезон</option>
                            </select>
                            <button id="apply-season" class="btn-primary" style="padding: 0.5rem 1rem;">Применить</button>
                        </div>
                    </div>
                    
                    <!-- Фильтр по датам -->
                    <div style="flex: 2; min-width: 300px;">
                        <label style="font-weight: bold;">Фильтр по диапазону дат:</label>
                        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap;">
                            <input type="date" id="date-from" style="flex: 1; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;" placeholder="Дата от">
                            <input type="date" id="date-to" style="flex: 1; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;" placeholder="Дата до">
                            <button id="apply-date" class="btn-primary" style="padding: 0.5rem 1rem;">Применить</button>
                        </div>
                    </div>
                    
                    <!-- Сброс -->
                    <div style="display: flex; align-items: flex-end;">
                        <button id="reset-filters" class="btn-secondary" style="padding: 0.5rem 1rem;">Сбросить всё</button>
                    </div>
                </div>
            </div>

            <div class="similar-settings" style="margin: 1rem 0; padding: 1rem; background: #e8f4f8; border-radius: 8px;">
                <h4 style="margin-bottom: 0.5rem;">🔄 Настройки похожих игроков</h4>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;">
                    <div style="min-width: 120px;">
                        <label>Кол-во игроков:</label>
                        <input type="number" id="similar-top-k" min="1" max="20" value="5" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                    </div>
                    <div style="min-width: 150px;">
                        <label>Мин. минут:</label>
                        <input type="number" id="similar-min-minutes" min="0" max="5000" value="100" step="50" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                    </div>
                    <div style="min-width: 150px;">
                        <label>Сезон:</label>
                        <select id="similar-season" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                            <option value="">Автоопределение</option>
                        </select>
                    </div>
                    <div>
                        <button id="find-similar-btn" class="btn-primary" style="padding: 0.5rem 1rem;">🔍 Найти похожих игроков</button>
                    </div>
                </div>
            </div>

            <div class="stats-grid" id="player-stats-grid"></div>

            <div class="tabs">
                <button class="tab active" onclick="switchPlayerTab('teams')">Команды</button>
                <button class="tab" onclick="switchPlayerTab('fixtures')">Матчи</button>
            </div>

            <div id="player-teams" class="tab-pane active">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Команда</th>
                            <th>Сезон</th>
                        </tr>
                    </thead>
                    <tbody id="teams-tbody"></tbody>
                </table>
            </div>

            <div id="player-fixtures" class="tab-pane">
                <div id="fixtures-list"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Футбольная аналитика. Все права защищены.</p>
    </footer>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="player.js"></script>
</body>
</html>
