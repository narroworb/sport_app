<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - Sports Analytics</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2><a href="/" style="text-decoration:none; color:#2c3e50;">⚽ Sports Analytics</a></h2>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Home</a>
                <a href="/search.html" class="nav-link">Search</a>
                <div class="auth-section">
                    <span id="user-name" style="display:none; margin-right: 15px;"></span>
                    <button id="auth-btn" class="btn-primary" onclick="toggleAuthPanel()">Login</button>
                    <button id="logout-btn" class="btn-secondary" style="display:none;" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="auth-panel" class="auth-panel" style="display:none;">
        <div class="auth-container">
            <div class="close-btn" onclick="toggleAuthPanel()">✕</div>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>
            
            <form id="login-form" class="tab-content active">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Login</button>
                <div id="login-error" class="error-msg"></div>
            </form>

            <form id="register-form" class="tab-content">
                <input type="text" id="register-username" placeholder="Username" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <input type="password" id="register-password-confirm" placeholder="Confirm Password" required>
                <button type="submit" class="btn-primary">Register</button>
                <div id="register-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <main class="container">
        <div id="player-detail" class="detail-container">
            <div class="detail-header">
                <div class="detail-title">
                    <h1 id="player-name">Loading...</h1>
                    <div class="detail-meta">
                        <span id="player-position" class="badge"></span>
                        <span id="player-nation" class="badge"></span>
                    </div>
                </div>
                <div class="detail-actions">
                    <button id="fav-btn" class="btn-secondary btn-small" onclick="toggleFavorite()" style="display:none;">★ Add to Favorites</button>
                </div>
            </div>

            <!-- Фильтры статистики -->
            <div class="stats-filters" style="margin: 1rem 0; padding: 1rem; background: #f8f9fa; border-radius: 8px;">
                <h4 style="margin-bottom: 0.5rem;">📊 Filter Statistics</h4>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;">
                    <div style="flex: 1; min-width: 150px;">
                        <label>Filter by Season:</label>
                        <select id="season-filter" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                            <option value="">All Seasons</option>
                        </select>
                    </div>
                    <div style="text-align: center; padding-top: 0.5rem;">OR</div>
                    <div style="flex: 1; min-width: 150px;">
                        <label>Date From:</label>
                        <input type="date" id="date-from" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                    </div>
                    <div style="flex: 1; min-width: 150px;">
                        <label>Date To:</label>
                        <input type="date" id="date-to" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                    </div>
                    <div>
                        <button id="apply-filters" class="btn-primary" style="padding: 0.5rem 1rem;">Apply Filters</button>
                        <button id="reset-filters" class="btn-secondary" style="padding: 0.5rem 1rem;">Reset</button>
                    </div>
                </div>
            </div>

            <div class="stats-grid" id="player-stats-grid"></div>

            <div class="tabs">
                <button class="tab active" onclick="switchPlayerTab('teams')">Teams</button>
                <button class="tab" onclick="switchPlayerTab('fixtures')">Fixtures</button>
            </div>

            <div id="player-teams" class="tab-pane active">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Team</th>
                            <th>Season</th>
                            <th>Position</th>
                        </tr>
                    </thead>
                    <tbody id="teams-tbody"></tbody>
                </table>
            </div>

            <div id="player-fixtures" class="tab-pane">
                <div id="fixtures-list"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Sports Analytics. All rights reserved.</p>
    </footer>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="player.js"></script>
</body>
</html>
