<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск - Футбольная аналитика</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2><a href="/" style="text-decoration:none; color:#2c3e50;">⚽ Футбольная аналитика</a></h2>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Главная</a>
                <a href="/search" class="nav-link">Поиск</a>
                <div class="auth-section">
                    <span id="user-name" style="display:none; margin-right: 15px;"></span>
                    <button id="auth-btn" class="btn-primary" onclick="toggleAuthPanel()">Войти</button>
                    <button id="logout-btn" class="btn-secondary" style="display:none;" onclick="logout()">Выйти</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="auth-panel" class="auth-panel" style="display:none;">
        <div class="auth-container">
            <div class="close-btn" onclick="toggleAuthPanel()">✕</div>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login', event)">Вход</button>
                <button class="tab-btn" onclick="switchTab('register', event)">Регистрация</button>
            </div>
            
            <form id="login-form" class="tab-content active">
                <input type="text" id="login-username" placeholder="Логин" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button type="submit" class="btn-primary">Войти</button>
                <div id="login-error" class="error-msg"></div>
            </form>

            <form id="register-form" class="tab-content">
                <input type="text" id="register-username" placeholder="Логин" required>
                <input type="password" id="register-password" placeholder="Пароль" required>
                <input type="password" id="register-password-confirm" placeholder="Подтвердите пароль" required>
                <button type="submit" class="btn-primary">Регистрация</button>
                <div id="register-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <main class="container">
        <section class="section">
            <h2>Поиск</h2>
            <div class="search-bar" style="max-width: 100%; margin-bottom: 2rem;">
                <input type="text" id="search-input" placeholder="Поиск игроков, команд, турниров, тренеров...">
                <button onclick="performSearch()">Найти</button>
            </div>

            <div id="search-results" class="search-results">
                <p class="loading">Начните поиск, чтобы найти игроков, команды, турниры и многое другое</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Футбольная аналитика. Все права защищены.</p>
    </footer>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="search.js"></script>
</body>
</html>
