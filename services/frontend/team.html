<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Команда - Футбольная аналитика</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2><a href="/" style="text-decoration:none; color:#2c3e50;">⚽ Футбольная аналитика</a></h2>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Главная</a>
                <a href="/search" class="nav-link">Поиск</a>
                <div class="auth-section">
                    <span id="user-name" style="display:none; margin-right: 15px;"></span>
                    <button id="auth-btn" class="btn-primary" onclick="toggleAuthPanel()">Войти</button>
                    <button id="logout-btn" class="btn-secondary" style="display:none;" onclick="logout()">Выйти</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="auth-panel" class="auth-panel" style="display:none;">
        <div class="auth-container">
            <div class="close-btn" onclick="toggleAuthPanel()">✕</div>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login', event)">Вход</button>
                <button class="tab-btn" onclick="switchTab('register', event)">Регистрация</button>
            </div>
            
            <form id="login-form" class="tab-content active">
                <input type="text" id="login-username" placeholder="Логин" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button type="submit" class="btn-primary">Войти</button>
                <div id="login-error" class="error-msg"></div>
            </form>

            <form id="register-form" class="tab-content">
                <input type="text" id="register-username" placeholder="Логин" required>
                <input type="password" id="register-password" placeholder="Пароль" required>
                <input type="password" id="register-password-confirm" placeholder="Подтвердите пароль" required>
                <button type="submit" class="btn-primary">Регистрация</button>
                <div id="register-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <main class="container">
        <div id="team-detail" class="detail-container">
            <div class="detail-header">
                <div class="detail-title">
                    <h1 id="team-name">Загрузка...</h1>
                    <div class="detail-meta">
                        <span id="team-info" class="badge"></span>
                    </div>
                </div>
                <div class="detail-actions">
                    <button id="fav-btn" class="btn-secondary btn-small" onclick="toggleFavorite()" style="display:none;">★ Добавить в избранное</button>
                </div>
            </div>

            <!-- Фильтры статистики -->
            <div class="stats-filters" style="margin: 1rem 0; padding: 1rem; background: #f8f9fa; border-radius: 8px;">
                <h4 style="margin-bottom: 0.5rem;">📊 Фильтр статистики</h4>
                <div style="display: flex; gap: 2rem; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 200px;">
                        <label style="font-weight: bold;">Фильтр по сезону:</label>
                        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                            <select id="season-filter" style="flex: 1; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                                <option value="">Выберите сезон</option>
                            </select>
                        </div>
                    </div>
                    <div style="flex: 2; min-width: 300px;">
                        <label style="font-weight: bold;">Фильтр по диапазону дат:</label>
                        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap;">
                            <input type="date" id="date-from" style="flex: 1; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                            <input type="date" id="date-to" style="flex: 1; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                        </div>
                    </div>
                    <div style="display: flex; gap: 0.5rem; align-items: flex-end;">
                        <button id="apply-filters" class="btn-primary" style="padding: 0.5rem 1rem;" onclick="applyStatsFilters()">Применить</button>
                        <button id="reset-filters" class="btn-secondary" style="padding: 0.5rem 1rem;" onclick="resetStatsFilters()">Сбросить</button>
                    </div>
                </div>
            </div>

            <div class="stats-grid" id="team-stats-grid"></div>

            <div class="tabs">
                <button class="tab active" onclick="switchTeamTab('overview')">Обзор</button>
                <button class="tab" onclick="switchTeamTab('players')">Игроки</button>
                <button class="tab" onclick="switchTeamTab('manager')">Тренер</button>
                <button class="tab" onclick="switchTeamTab('fixtures')">Матчи</button>
            </div>

            <div id="team-overview" class="tab-pane active">
                <h3>Следующий матч</h3>
                <div id="next-game" class="card match-card"></div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; margin-bottom: 1rem;">
                    <h3 style="margin: 0;">Турнирная таблица</h3>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <label>Сезон:</label>
                        <select id="table-season-filter" style="padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                            <option value="">Текущий сезон</option>
                        </select>
                        <button id="apply-table-season" class="btn-primary" style="padding: 0.5rem 1rem;">Применить</button>
                    </div>
                </div>
                
                <table class="table" id="standing-table">
                    <thead>
                        <tr>
                            <th>Позиция</th>
                            <th>Команда</th>
                            <th>Очки</th>
                            <th>Игр</th>
                            <th>В/Н/П</th>
                        </tr>
                    </thead>
                    <tbody id="standing-tbody"></tbody>
                </table>
            </div>

            <div id="team-players" class="tab-pane">
                <table class="table sortable-table">
                    <thead>
                        <tr>
                            <th data-sort="name">Игрок <span class="sort-icon">↕️</span></th>
                            <th data-sort="position">Позиция <span class="sort-icon">↕️</span></th>
                            <th data-sort="matches">Матчи <span class="sort-icon">↕️</span></th>
                            <th data-sort="goals">Голы <span class="sort-icon">↕️</span></th>
                            <th data-sort="assists">Передачи <span class="sort-icon">↕️</span></th>
                            <th data-sort="rating">Рейтинг <span class="sort-icon">↕️</span></th>
                            <th data-sort="goals_per_90">Г/90 <span class="sort-icon">↕️</span></th>
                            <th data-sort="minutes">Минуты <span class="sort-icon">↕️</span></th>
                        </tr>
                    </thead>
                    <tbody id="players-tbody"></tbody>
                </table>
            </div>

            <div id="team-manager" class="tab-pane">
                <div id="manager-card"></div>
            </div>

            <div id="team-fixtures" class="tab-pane">
                <div id="fixtures-list"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Футбольная аналитика. Все права защищены.</p>
    </footer>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="team.js"></script>
</body>
</html>
