<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team - Sports Analytics</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2><a href="/" style="text-decoration:none; color:#2c3e50;">⚽ Sports Analytics</a></h2>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Home</a>
                <a href="/search.html" class="nav-link">Search</a>
                <div class="auth-section">
                    <span id="user-name" style="display:none; margin-right: 15px;"></span>
                    <button id="auth-btn" class="btn-primary" onclick="toggleAuthPanel()">Login</button>
                    <button id="logout-btn" class="btn-secondary" style="display:none;" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="auth-panel" class="auth-panel" style="display:none;">
        <div class="auth-container">
            <div class="close-btn" onclick="toggleAuthPanel()">✕</div>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>
            
            <form id="login-form" class="tab-content active">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Login</button>
                <div id="login-error" class="error-msg"></div>
            </form>

            <form id="register-form" class="tab-content">
                <input type="text" id="register-username" placeholder="Username" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <input type="password" id="register-password-confirm" placeholder="Confirm Password" required>
                <button type="submit" class="btn-primary">Register</button>
                <div id="register-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <main class="container">
        <div id="team-detail" class="detail-container">
            <div class="detail-header">
                <div class="detail-title">
                    <h1 id="team-name">Loading...</h1>
                    <div class="detail-meta">
                        <span id="team-info" class="badge"></span>
                    </div>
                </div>
                <div class="detail-actions">
                    <button id="fav-btn" class="btn-secondary btn-small" onclick="toggleFavorite()" style="display:none;">★ Add to Favorites</button>
                </div>
            </div>

            <div class="stats-grid" id="team-stats-grid"></div>

            <div class="tabs">
                <button class="tab active" onclick="switchTeamTab('overview')">Overview</button>
                <button class="tab" onclick="switchTeamTab('players')">Players</button>
                <button class="tab" onclick="switchTeamTab('manager')">Manager</button>
                <button class="tab" onclick="switchTeamTab('fixtures')">Fixtures</button>
            </div>

            <div id="team-overview" class="tab-pane active">
                <h3>Next Game</h3>
                <div id="next-game" class="card match-card"></div>
                <h3 style="margin-top: 2rem;">Standing</h3>
                <table class="table" id="standing-table">
                    <thead>
                        <tr>
                            <th>Position</th>
                            <th>Team</th>
                            <th>Points</th>
                            <th>Played</th>
                            <th>W/D/L</th>
                        </tr>
                    </thead>
                    <tbody id="standing-tbody"></tbody>
                </table>
            </div>

            <div id="team-players" class="tab-pane">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Position</th>
                            <th>Number</th>
                        </tr>
                    </thead>
                    <tbody id="players-tbody"></tbody>
                </table>
            </div>

            <div id="team-manager" class="tab-pane">
                <div id="manager-card"></div>
            </div>

            <div id="team-fixtures" class="tab-pane">
                <div id="fixtures-list"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Sports Analytics. All rights reserved.</p>
    </footer>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="team.js"></script>
</body>
</html>
