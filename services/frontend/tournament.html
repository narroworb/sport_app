<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament - Sports Analytics</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2><a href="/" style="text-decoration:none; color:#2c3e50;">⚽ Sports Analytics</a></h2>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Home</a>
                <a href="/search.html" class="nav-link">Search</a>
                <div class="auth-section">
                    <span id="user-name" style="display:none; margin-right: 15px;"></span>
                    <button id="auth-btn" class="btn-primary" onclick="toggleAuthPanel()">Login</button>
                    <button id="logout-btn" class="btn-secondary" style="display:none;" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="auth-panel" class="auth-panel" style="display:none;">
        <div class="auth-container">
            <div class="close-btn" onclick="toggleAuthPanel()">✕</div>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>
            
            <form id="login-form" class="tab-content active">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Login</button>
                <div id="login-error" class="error-msg"></div>
            </form>

            <form id="register-form" class="tab-content">
                <input type="text" id="register-username" placeholder="Username" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <input type="password" id="register-password-confirm" placeholder="Confirm Password" required>
                <button type="submit" class="btn-primary">Register</button>
                <div id="register-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <main class="container">
        <div id="tournament-detail" class="detail-container">
            <div class="detail-header">
                <div class="detail-title">
                    <h1 id="tournament-name">Loading...</h1>
                    <div class="detail-meta">
                        <span id="tournament-season" class="badge season"></span>
                    </div>
                </div>
                <div class="detail-actions">
                    <button id="fav-btn" class="btn-secondary btn-small" onclick="toggleFavorite()" style="display:none;">★ Add to Favorites</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTournamentTab('table')">Table</button>
                <button class="tab" onclick="switchTournamentTab('teams-stats')">Teams Stats</button>
                <button class="tab" onclick="switchTournamentTab('players-stats')">Players Stats</button>
                <button class="tab" onclick="switchTournamentTab('fixtures')">Fixtures</button>
            </div>

            <div id="tournament-table" class="tab-pane active">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Position</th>
                            <th>Team</th>
                            <th>P</th>
                            <th>W</th>
                            <th>D</th>
                            <th>L</th>
                            <th>GF</th>
                            <th>GA</th>
                            <th>Pts</th>
                        </tr>
                    </thead>
                    <tbody id="table-tbody"></tbody>
                </table>
            </div>

            <div id="tournament-teams-stats" class="tab-pane">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Team</th>
                            <th>Goals</th>
                            <th>Shots</th>
                            <th>Possession</th>
                        </tr>
                    </thead>
                    <tbody id="teams-stats-tbody"></tbody>
                </table>
            </div>

            <div id="tournament-players-stats" class="tab-pane">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Team</th>
                            <th>Goals</th>
                            <th>Assists</th>
                            <th>Rating</th>
                        </tr>
                    </thead>
                    <tbody id="players-stats-tbody"></tbody>
                </table>
            </div>

            <div id="tournament-fixtures" class="tab-pane">
                <div id="fixtures-list"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Sports Analytics. All rights reserved.</p>
    </footer>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="tournament.js"></script>
</body>
</html>
